services:
  - type: web
    name: ai-reporting-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LANGGRAPH_CHECKPOINT_PATH
        value: "backend_checkpoints.sqlite"

  - type: web
    name: ai-reporting-frontend
    env: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: ai-reporting-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
